<!DOCTYPE html>
<html>

<head>
<title>Manga Section</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
background-color:#3a3a3a;
color:white;
text-align:center;
}

/* column container */

.manga-column{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
margin-top:30px;
}

/* manga card */

.manga-card{
background-color:#2b2b2b;
padding:15px;
border-radius:12px;
width:250px;
transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.manga-card:hover{
transform:scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* manga image */

.manga-card img{
width:200px;
border-radius:8px;
}

/* button */

.manga-card button{
margin-top:10px;
background-color:#4CAF50;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:8px;
font-size:15px;
}

</style>

</head>

<body>

<h1>Manga</h1>

<p>
This is the manga section. Click on the manga you want to learn about.
<br><br>
Just so you know, you won't be able to read the manga here.  
You'll only get a summary. Go borrow from the library or buy it from a store.  
Support the author!
</p>

  <a class="home-btn" href="index.html">← Back to Homepage</a>

</div>

</div>

<div class="manga-card">

<br>

</div>

</div>

</body>

</html>
